name: Publish prerelease bridge build

on:
  workflow_dispatch:
  push:
    branches: main

concurrency:
  group: publish-prerelease-bridge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.swift', 'Package.resolved', 'Scripts/package_app.sh') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Validate bridge tests
        run: swift test

  build-package:
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      asset_name: ${{ steps.meta.outputs.asset_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.swift', 'Package.resolved', 'Scripts/package_app.sh') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Derive release metadata
        id: meta
        run: |
          version_name="0.1.0"
          build_number=$((1000 + GITHUB_RUN_NUMBER))
          short_sha="${GITHUB_SHA::7}"
          tag_name="prerelease-${version_name}-${build_number}-${short_sha}"
          asset_name="Courier-Bridge-${version_name}-${build_number}-${short_sha}.zip"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=Prerelease ${version_name} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          MACOS_DEVELOPER_ID_P12_B64: ${{ secrets.MACOS_DEVELOPER_ID_P12_B64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$MACOS_DEVELOPER_ID_P12_B64" ]; then
            echo "No Developer ID certificate configured; continuing without code signing."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          printf '%s' "$MACOS_DEVELOPER_ID_P12_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p runner "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p runner "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k runner "$KEYCHAIN_PATH"

      - name: Build bridge app bundle
        env:
          COURIER_BRIDGE_OUTPUT_DIR: ${{ runner.temp }}/dist
          COURIER_BRIDGE_VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          COURIER_BRIDGE_BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          COURIER_BRIDGE_CODESIGN_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_IDENTITY }}
        run: |
          chmod +x ./Scripts/package_app.sh
          ./Scripts/package_app.sh
          mv "$RUNNER_TEMP/dist"/Courier-Bridge-${{ steps.meta.outputs.version_name }}-${{ steps.meta.outputs.build_number }}.zip "$RUNNER_TEMP/dist/${{ steps.meta.outputs.asset_name }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: courier-bridge-release-zip
          path: ${{ runner.temp }}/dist/${{ steps.meta.outputs.asset_name }}
          if-no-files-found: error
          retention-days: 7

  publish:
    runs-on: macos-15
    timeout-minutes: 30
    needs:
      - validate
      - build-package

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: courier-bridge-release-zip
          path: ${{ runner.temp }}/dist

      - name: Decode notary API key
        env:
          APPLE_NOTARY_API_KEY_B64: ${{ secrets.APPLE_NOTARY_API_KEY_B64 }}
        run: |
          if [ -z "$APPLE_NOTARY_API_KEY_B64" ]; then
            echo "No notary API key configured; skipping decode."
            exit 0
          fi
          printf '%s' "$APPLE_NOTARY_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Notarize and staple app
        env:
          APPLE_NOTARY_API_KEY_B64: ${{ secrets.APPLE_NOTARY_API_KEY_B64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          if [ -z "$APPLE_NOTARY_API_KEY_B64" ] || [ -z "$APPLE_NOTARY_KEY_ID" ] || [ -z "$APPLE_NOTARY_ISSUER_ID" ]; then
            echo "Notary credentials are incomplete; skipping notarization."
            exit 0
          fi
          ZIP_PATH="$RUNNER_TEMP/dist/${{ needs.build-package.outputs.asset_name }}"
          unzip -q "$ZIP_PATH" -d "$RUNNER_TEMP/dist"
          APP_PATH="$RUNNER_TEMP/dist/Courier Bridge.app"
          xcrun notarytool submit "$ZIP_PATH" --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$APPLE_NOTARY_KEY_ID" --issuer "$APPLE_NOTARY_ISSUER_ID" --wait
          xcrun stapler staple "$APP_PATH"
          rm -f "$ZIP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-package.outputs.tag_name }}
          name: ${{ needs.build-package.outputs.release_name }}
          prerelease: true
          files: ${{ runner.temp }}/dist/${{ needs.build-package.outputs.asset_name }}
          body: |
            Automated prerelease bridge build for `${{ github.sha }}`.

            Download the attached macOS app archive, unzip it, and move `Courier Bridge.app` into `/Applications`.
            If signing and notary secrets are configured, this build is Developer ID signed and notarized.
